{% extends "base.html" %}
{% block content %}
<section class="section">
  <h1>Create Idea</h1>
  <form method="post" action="/app/ideas/new" class="card form-grid">
    <label for="title">Title</label>
    <input id="title" name="title" class="input" required>

    <label for="description">Description</label>
    <textarea id="description" name="description" class="input" rows="5" required></textarea>

    <label for="target_user">Target user</label>
    <input id="target_user" name="target_user" class="input" required>

    <label for="context">Context</label>
    <textarea id="context" name="context" class="input" rows="4"></textarea>

    <div>
      <button type="submit" class="btn primary">Create idea</button>
      <a href="/app/ideas" class="btn ghost">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
