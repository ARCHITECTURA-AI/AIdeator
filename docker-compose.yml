services:
  # FastAPI app container for local development/integration checks.
  app:
    build: .
    container_name: aideator-app
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_DEFAULT_MODE: ${APP_DEFAULT_MODE:-local}
      LLM_API_BASE: ${LLM_API_BASE:-http://llm:11434}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_JSON: ${LOG_JSON:-false}
    ports:
      - "8000:8000"
    depends_on:
      - llm
    volumes:
      - ./:/app
      - ./docs:/app/docs

  # Optional local LLM endpoint (Ollama) consumed by app via LLM_API_BASE.
  llm:
    image: ollama/ollama:latest
    container_name: aideator-llm
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  ollama-data:
