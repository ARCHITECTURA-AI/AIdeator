<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - AIdeator Report</title>
    <style>
        {{ css | safe }}
        
        /* Standalone overrides */
        body {
            background: #050505;
            color: white;
            padding: 4rem 2rem;
            display: flex;
            justify-content: center;
        }
        .report-container {
            max-width: 800px;
            width: 100%;
        }
    </style>
</head>
<body class="bg-black">
    <article class="report-container glass-panel p-16 relative overflow-hidden" id="report-view">
        <div class="scanning-line opacity-20"></div>
        <div class="prose prose-invert prose-primary max-w-none">
            {{ content | safe }}
        </div>
        
        <div class="mt-20 pt-10 border-t border-white/5 font-mono text-[10px] text-white/20 uppercase tracking-widest flex justify-between">
            <span>Generated by AIdeator v1.0 // Local Identity</span>
            <span>{{ date }}</span>
        </div>
    </article>

    <script>
        {{ js | safe }}
        
        // Auto-run animations on standalone load
        document.addEventListener('DOMContentLoaded', () => {
            if (window.AIdeatorPolish) {
                window.AIdeatorPolish.initReportAnimations();
            }
        });
    </script>
</body>
</html>
